services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: eatwisely-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
      - opensearch

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-${FIREBASE_API_KEY:-}}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-${GOOGLE_MAPS_API_KEY:-}}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME:-${CLOUDINARY_CLOUD_NAME:-}}
    container_name: eatwisely-frontend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: eatwisely-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend

  mongo:
    image: mongo:6
    container_name: eatwisely-mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7
    container_name: eatwisely-redis
    restart: always

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: eatwisely-opensearch
    restart: always
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=StrongPassword123!
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

volumes:
  mongo-data:
  opensearch-data:
